{% extends "base.html" %}

{% block title %}Checkbook Log{% endblock %}

{% block content %}
<style>
/* Mobile-only layout — no effect ≥640px */
@media (max-width: 640px) {
  /* Ledger needs all its columns — scroll it inside the card instead of crushing it */
  #log-app table { min-width: 620px; }
}
</style>
<div class="container mx-auto px-4 py-6 sm:py-8">
    <h1 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">Checkbook Log</h1>
    
    <div id="log-app" class="space-y-8">
        <!-- React will mount here -->
    </div>
</div>

<!-- Load React and ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Load our React components -->
<script type="text/babel" src="{{ url_for('static', filename='js/log.js') }}"></script>
{% endblock %}
